<!DOCTYPE html>
<html lang="ar">
	<head>
        <!-- Meta Tags -->
		<meta charset="utf-8">
		<meta name="description" content="#">
		<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <!-- Title -->
		<title>Login</title>

        <!-- Links -->
        <!-- Project Shortcut Icon -->
        <link rel="shortcut icon" href="assets/img/logo.svg" type="image/x-icon">
        <link rel="icon" href="assets/img/logo.svg" type="image/x-icon">

        <!-- Bootstrap V 4.1.3 -->
<!--        <link rel="stylesheet" href="assets/css/bootstrap.css">-->
        <link rel="stylesheet" href="https://cdn.rtlcss.com/bootstrap/v4.1.3/css/bootstrap.min.css" crossorigin="anonymous">
        <!-- FontAwesome 5 -->
		<link rel="stylesheet" href="assets/css/fontawesome.css">
        <!-- Icomoon Library --> <!-- Convert Images Svg To Icons -->
		<link rel="stylesheet" href="assets/css/icomoon.css">
        <!-- Owl Carousel Slider --> <!-- (Refrence) https://owlcarousel2.github.io/OwlCarousel2 -->
        <link rel="stylesheet" href="assets/css/owl.carousel.min.css">
        <link rel="stylesheet" href="assets/css/owl.theme.default.min.css">
        <!-- Main Styles -->
		<link rel="stylesheet" href="assets/css/style.css">
	</head>
	<body>
				<!-- PreLoader -->
				<div id="preloader" class="preloader">
						<div class="overlay">
								<img src="assets/img/loader.svg" class="preloader-icon img-fluid" />
						</div>
				</div>
				<!-- PreLoader -->

        <!-- Login -->
        <div id="page" class="page-container auth">
            <div class="overlay">
                <!-- Auth Content -->
                <div class="center-vertically">
                    <div class="auth-content">
                        <div class="back-to-home mb-3 text-center">
                            <a href="index.html" class=""><img src="assets/img/icons/logo_gold.svg" alt="Logo" class="img-fluid" /></a>
                        </div>
                        <div class="title mb-5 text-center">تسجيل الدخول</div>
                        <form class="auth-form">
                            <div class="connections-apis d-flex justify-content-between mb-4">
                                <a href="#" class="facebook d-flex justify-content-between">
                                    <span>بحسابك على فيس بوك</span>
                                    <img src="assets/img/icons/facebook_auth.svg" alt="Connection Facebook" class="img-fluid" />
                                </a>
                                <a href="#" class="google d-flex justify-content-between">
                                    <span>بحسابك على جوجل</span>
                                    <img src="assets/img/icons/google_auth.svg" alt="Connection Google" class="img-fluid" />
                                </a>
                            </div>
                            <div class="form-group mb-4">
                                <input type="email" class="form-control" placeholder="بريدك الإلكتروني">
                            </div>
                            <div class="form-group d-flex mb-4">
                                <input type="password" class="form-control" placeholder="كلمة المرور">
                            </div>
                            <div class="mb-2">
                                <button type="submit" class="btn main-btn">التالي</button>
                            </div>
                            <small>بالدخول الى حسابك، فإنك توافق على سياسة الإستخدام</small>
                        </form>
                        <div class="divider"></div>
                        <div class="privacy-policy text-right"><a href="#">سياسة الإستخدام</a></div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Products -->

		<!-- Scripts -->
        <!-- Jquery V 3.3.1 -->
        <script src="assets/js/jquery.min.js"></script>
        <!-- Popper Js -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"
                integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
                crossorigin="anonymous"></script>
        <!-- Bootstrap V 4.3.1 -->
        <script src="assets/js/bootstrap.min.js"></script>
        <!-- Owl Carousel Slider --> <!-- (Refrence) https://owlcarousel2.github.io/OwlCarousel2 -->
        <script src="assets/js/owl.carousel.min.js"></script>
        <!-- Main Functions -->
        <script src="assets/js/functions.js"></script>
	</body>
</html>
