        <div id="page" class="page-container">
						<div class="auth-big-logo">
								<div class="container-fluid">

						</div>

								<div class="auth-content">

												<button class="btn main-btn-backdrop" type="button" name="button">Log in</button>
										</div>
										<div class="dont-have-text">

								</div>
