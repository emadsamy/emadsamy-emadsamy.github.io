											</div>
											<div class="navbar-links d-flex">
													<div class="nav-link">
															<a href="auth.html">
																	<span class="icon-user nav-link-icon"></span
															</a>
													</div>
													<div class="nav-link">
															<a id="menuBar" class="menu-bar-a">

										<div class="auth-content login">
												<div class="center-vertically">
														<div class="auth-items">
																<div class="title mb-4">تسجيل الدخول</div>
																<div class="connection-tokens d-flex justify-content-between mb-4">
																		<a href="#" class="connection-tk-item con-fb d-flex justify-content-between">
																			<span>بحسابك علي فيس بوك</span>
																			<img src="assets/img/icons/facebook_auth.svg" class="img-fluid"  />
																		</a>
																		<a href="#" class="connection-tk-item con-g d-flex justify-content-between">
																			<span>بحسابك علي جوجل</span>
																			<img src="assets/img/icons/google_auth.svg" class="img-fluid"  />
																		</a>
																</div>
																<form class="auth-form mb-5" action="index.html" method="post">
																	<div class="form-group mb-4">
																			<input type="email" class="form-control" placeholder="بريدك الإلكتروني">
																	</div>
																	<div class="form-group mb-4">
			                                <input type="password" class="form-control" placeholder="كلمة المرور ">
			                            </div>
																	<div class="mb-2">
																			<button type="button" class="btn main-btn d-block">التالي</button>
																	</div>
																	<small>بالدخول الى حسابك، فإنك توافق على سياسة الإستخدام</small>
																</form>
														</div>
												</div>
										</div>

											<div class="center-vertically">
													<div class="auth-items">
															<div class="title mb-4">إنشاء حسابك</div>
															<form class="auth-form" action="index.html" method="post">
																<div class="form-group mb-4">
		                                <input type="text" class="form-control" placeholder="الإسم">
		                            </div>
		                            <div class="form-group mb-4">
		                                <input type="email" class="form-control" placeholder="بريدك الإلكتروني">
		                            </div>
		                            <div class="form-group d-flex mb-4">
		                                <input type="password" class="form-control" placeholder="كلمة المرور">
		                                <small class="text-right">يجب الأ تقل عن ستة حروف أو رموز</small>
		                            </div>
		                            <div class="form-group mb-4">
		                                <input type="password" class="form-control" placeholder="تأكيد كلمة المرور ">
		                            </div>
																<div class="mb-2">
																		<button type="button" class="btn main-btn d-block">انشئ حسابك</button>
																</div>
																<small>بالدخول الى حسابك، فإنك توافق على سياسة الإستخدام</small>

													</div>
